{% extends 'base/base.html' %}
{% block title %}채널 - postone{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="stat-card" style="max-width:500px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-semibold">채널명 <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control"
                   value="{{ channel.name|default:'' }}" required
                   placeholder="예: 인스타그램, 유튜브 쇼츠">
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">슬러그 <span class="text-danger">*</span></label>
            <input type="text" name="slug" class="form-control"
                   value="{{ channel.slug|default:'' }}" required
                   placeholder="예: instagram, youtube-shorts">
            <div class="form-text">영문 소문자, 숫자, 하이픈만 사용</div>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">채널 유형 <span class="text-danger">*</span></label>
            <select name="channel_type" class="form-select" required>
                <option value="text" {% if channel.channel_type == 'text' %}selected{% endif %}>텍스트</option>
                <option value="video" {% if channel.channel_type == 'video' %}selected{% endif %}>영상 자막</option>
                <option value="image" {% if channel.channel_type == 'image' %}selected{% endif %}>이미지 카드</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">설명</label>
            <textarea name="description" class="form-control" rows="2"
                      placeholder="채널에 대한 간단한 설명">{{ channel.description|default:'' }}</textarea>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">정렬 순서</label>
            <input type="number" name="order" class="form-control"
                   value="{{ channel.order|default:0 }}" min="0">
        </div>
        <div class="mb-4 d-flex gap-4">
            <div class="form-check">
                <input type="checkbox" name="is_auto_publish" class="form-check-input" id="autoPublish"
                       {% if channel.is_auto_publish %}checked{% endif %}>
                <label class="form-check-label" for="autoPublish">자동발행 가능</label>
            </div>
            <div class="form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="isActive"
                       {% if channel.is_active|default:True %}checked{% endif %}>
                <label class="form-check-label" for="isActive">활성화</label>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">저장</button>
            <a href="{% url 'dashboard:channel_list' %}" class="btn btn-outline-secondary">취소</a>
        </div>
    </form>
</div>
{% endblock %}
