{% extends 'base/base.html' %}
{% block title %}채널 프롬프트 - 1post{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="stat-card" style="max-width:700px;">
    <form method="post">
        {% csrf_token %}
        {% if not channel_prompt %}
        <div class="mb-3">
            <label class="form-label fw-semibold">채널 선택 <span class="text-danger">*</span></label>
            <select name="channel" class="form-select" required>
                <option value="">채널을 선택하세요</option>
                {% for ch in channels %}
                <option value="{{ ch.pk }}">{{ ch.name }}</option>
                {% endfor %}
            </select>
        </div>
        {% else %}
        <div class="mb-3">
            <label class="form-label fw-semibold">채널</label>
            <input type="text" class="form-control" value="{{ channel_prompt.channel.name }}" disabled>
        </div>
        {% endif %}
        <div class="mb-3">
            <label class="form-label fw-semibold">기본 프롬프트 <span class="text-danger">*</span></label>
            <textarea name="base_prompt" class="form-control" rows="8" required
                      placeholder="Claude에게 전달할 기본 프롬프트를 작성하세요.">{{ channel_prompt.base_prompt|default:'' }}</textarea>
        </div>
        {% if channel_prompt %}
        <div class="mb-4">
            <div class="form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="isActive"
                       {% if channel_prompt.is_active %}checked{% endif %}>
                <label class="form-check-label" for="isActive">활성화</label>
            </div>
        </div>
        {% endif %}
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">저장</button>
            <a href="{% url 'dashboard:content_type_detail' content_type.pk %}" class="btn btn-outline-secondary">취소</a>
        </div>
    </form>
</div>
{% endblock %}
