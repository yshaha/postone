{% extends 'base/base.html' %}
{% block title %}콘텐츠 유형 - postone{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="stat-card" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-semibold">유형명 <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control"
                   value="{{ form.name.value|default:'' }}" required
                   placeholder="예: 맛집 소개, 신제품 홍보">
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">설명</label>
            <textarea name="description" class="form-control" rows="3"
                      placeholder="이 유형에 대한 간단한 설명">{{ form.description.value|default:'' }}</textarea>
        </div>
        <div class="mb-4">
            <div class="form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="isActive"
                       {% if form.is_active.value != False %}checked{% endif %}>
                <label class="form-check-label" for="isActive">활성화</label>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">저장</button>
            <a href="{% url 'dashboard:content_type_list' %}" class="btn btn-outline-secondary">취소</a>
        </div>
    </form>
</div>
{% endblock %}
