<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 1post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .login-card {
            max-width: 400px; margin: 80px auto;
            background: #fff; border-radius: 16px;
            padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .brand { font-size: 32px; font-weight: 700; color: #1e1e2e; }
        .brand span { color: #6366f1; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <div class="brand"><span>1</span>post</div>
        <p class="text-muted mt-1">한 번 입력, 모든 채널 발행</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="아이디" required autofocus>
        </div>
        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="비밀번호" required>
        </div>
        {% if form.errors %}
        <div class="alert alert-danger py-2 small">아이디 또는 비밀번호가 올바르지 않습니다.</div>
        {% endif %}
        <button type="submit" class="btn btn-primary w-100">로그인</button>
    </form>
</div>
</body>
</html>
