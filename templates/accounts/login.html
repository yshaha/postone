<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - postone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .login-card {
            max-width: 400px; margin: 80px auto;
            background: #fff; border-radius: 16px;
            padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .brand { font-size: 32px; font-weight: 700; color: #1e1e2e; }
        .brand span { color: #e53e3e; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <div class="brand">post<span>one</span></div>
        <p class="text-muted mt-1">Post Once, Reach Everywhere</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="아이디" required autofocus>
        </div>
        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="비밀번호" required>
        </div>
        {% if form.errors %}
        <div class="alert alert-danger py-2 small">아이디 또는 비밀번호가 올바르지 않습니다.</div>
        {% endif %}
        <button type="submit" class="btn btn-primary w-100">로그인</button>
    </form>

    <div class="my-3 text-center text-muted small">또는 소셜 계정으로 로그인</div>

    <div class="d-flex flex-column gap-2">
        <a href="{% url 'social:begin' 'kakao' %}" class="btn w-100 fw-semibold" style="background:#FEE500;color:#000;">
            <img src="https://developers.kakao.com/assets/img/about/logos/kakaolink/kakaolink_btn_medium.png" height="20" class="me-2">카카오로 로그인
        </a>
        <a href="{% url 'social:begin' 'naver' %}" class="btn w-100 fw-semibold text-white" style="background:#03C75A;">
            <span class="me-2 fw-bold">N</span>네이버로 로그인
        </a>
        <a href="{% url 'social:begin' 'google-oauth2' %}" class="btn w-100 fw-semibold btn-outline-secondary">
            <img src="https://www.google.com/favicon.ico" height="20" class="me-2">구글로 로그인
        </a>
    </div>
</div>
</body>
</html>
